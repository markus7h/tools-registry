name: md_to_pdf
description: Konvertiert eine Markdown-Datei in eine formatierte PDF via Python markdown + WeasyPrint (im zentralen Konvertier-Dienst). Designs `collana` (oranges b-imtec, default), `magicM` (LaTeX-Serif, Seitennummerierung) und `magic3` (IBCS/SUCCESS, hell, grüner Akzent #388E3C). Gibt den PDF-Pfad zurück.
exec: ./run.sh
inputs:
  md_path:
    type: string
    description: Absoluter Pfad zur Eingabe-.md-Datei.
    required: true
  output_path:
    type: string
    description: "Absoluter Pfad der Ausgabe-PDF. Standard: gleicher Ordner wie md_path, gleicher Name mit .pdf."
    required: false
  design:
    type: string
    description: "Design-Variante: `collana` (default, oranges b-imtec/Sans-Serif, Akzent #fa4a05), `magicM` (LaTeX-inspiriert, Serif mit Computer-Modern-Stack, mittige Seitennummerierung im Footer, Booktabs-Tabellen, justified mit Hyphenation) oder `magic3` (hauseigenes IBCS/SUCCESS-Design: hell, Source Sans 3, grüner Akzent #388E3C, Seitennummerierung)."
    required: false
outputs:
  pdf_path:
    type: string
    description: Absoluter Pfad zur erstellten PDF-Datei.
  size_bytes:
    type: number
    description: Dateigröße der PDF in Bytes.
requires:
  - curl
ai_rem_entity: tool_md_to_pdf
