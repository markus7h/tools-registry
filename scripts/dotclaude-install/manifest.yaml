name: dotclaude_install
description: >
  Installiert/aktualisiert lokale Claude-Code-Assets (Agents, Skills und Hooks)
  unter ~/.claude/ aus der tools-registry-Registry. Agents -> ~/.claude/agents/<name>.md,
  Skills -> ~/.claude/skills/<name>/, Hooks -> ~/.claude/hooks/ (tool-discovery.sh
  an stabilen Pfad). mode=check zeigt nur Abweichungen, mode=apply schreibt die
  Dateien. kind filtert auf agents, skills oder hooks (default all). Der Hook wird
  nur deployt, nicht in settings.json registriert - fehlt der Eintrag, gibt der Lauf
  einen AKTION-ERFORDERLICH-Block aus (registration_pending). So lassen sich die
  hauseigenen Assets auf jedem System ohne manuelles Kopieren ausrollen.
exec: ./run.sh
inputs:
  mode:
    type: string
    description: "check (nur Diff anzeigen, default) oder apply (Dateien schreiben/aktualisieren)"
    required: false
  kind:
    type: string
    description: "all (default), agents, skills oder hooks - schraenkt ein, was ausgeliefert wird"
    required: false
outputs:
  changed:
    type: boolean
    description: Ob Dateien abweichen (check) bzw. geschrieben wurden (apply).
  applied:
    type: boolean
    description: Ob im apply-Modus geschrieben wurde.
  registration_pending:
    type: boolean
    description: Hook deployt, aber noch nicht in settings.json registriert (manueller Schritt offen).
ai_rem_entity: tool_dotclaude_install
