services:
  tools-registry:
    image: tools-registry:latest
    build:
      context: .
      dockerfile: Dockerfile.registry
    container_name: tools-registry
    restart: unless-stopped
    ports:
      - "${PORT:-3457}:3457"
    volumes:
      # Quelle der Scripts = das Repo-scripts/-Verzeichnis auf dem Host.
      # Read-only: die Registry liefert nur aus, geschrieben wird via Repo.
      # Pfad ggf. via SCRIPTS_DIR überschreiben (z.B. absoluter Pfad auf dem zentralen Host).
      - ${SCRIPTS_DIR:-./scripts}:/app/scripts:ro
    environment:
      - PORT=3457
      - HOST=0.0.0.0
      - TOOLS_REGISTRY_TOKEN=${TOOLS_REGISTRY_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3457/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
